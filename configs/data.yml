# Data configuration for PPRAG project

# Path local to my project root (NOTE: Root dir for Aaryesh)
paths:
  ligands_csv: data/meta/ligands.csv
  pockets_csv: data/meta/targets.csv
  meta_out:    data/meta/splits
  pocket_out:  data/interim/pockets
  centers_json: data/meta/pocket_centers.json   # optional; can be empty/missing

pocket:
  radius: 10.0     # angstrom; 9–12 angstrom works well for PPARγ LBD

splits:
  seed: 16
  train_frac: 0.8
  val_frac: 0.1
